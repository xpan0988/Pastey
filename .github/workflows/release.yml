name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            # GitHub-hosted macos-14 currently maps to a macOS 14 arm64 image.
            os: macos-14
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-latest
            artifact_glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: Linux x86_64
            os: ubuntu-latest
            artifact_glob: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Check release version
        run: npm run check:version

      - name: Build frontend
        run: npm run build

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Check and test Linux verification targets
        if: runner.os == 'Linux'
        run: |
          cargo check --all-targets --all-features --manifest-path src-tauri/Cargo.toml
          cargo test --all-targets --all-features --manifest-path src-tauri/Cargo.toml

      - name: Build installers and audit bundle contents
        if: runner.os != 'Linux'
        run: npm run build:checked

      - name: Build Linux installers and audit bundle contents
        if: runner.os == 'Linux'
        run: npm run build:checked:linux

      - name: Normalize installer artifact names
        shell: bash
        run: |
          set -euo pipefail
          node scripts/normalize-release-artifacts.mjs

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          fail_on_unmatched_files: true
